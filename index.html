<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Modern Portfolio</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- =========================
       NAVBAR
  ========================== -->

  <nav class="navbar">

    <div class="logo">
      Portfolio
    </div>

    <ul class="nav-links">
      <li><a href="#hero">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#skills-section">Skills</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>

  </nav>



  <!-- =========================
       HERO SECTION
  ========================== -->

  <section class="hero" id="hero">

    <div class="hero-content">

      <p class="small-text">Hello, I'm</p>

      <!-- JavaScript inserts data here -->
      <h1 id="name"></h1>

      <h2 id="role"></h2>

      <p id="bio"></p>

      <button id="themeButton">
        Change Theme
      </button>

    </div>

  </section>



  <!-- =========================
       ABOUT SECTION
  ========================== -->

  <section class="about" id="about">

    <div class="section-container">

      <h2>About Me</h2>

      <p>
        This is a beginner-friendly portfolio website made using
        HTML, CSS, and JavaScript only.
      </p>

    </div>

  </section>



  <!-- =========================
       SKILLS SECTION
  ========================== -->

  <section class="skills" id="skills-section">

    <div class="section-container">

      <h2>Skills</h2>

      <!-- Skills added dynamically -->
      <div class="skills-grid" id="skills"></div>

    </div>

  </section>



  <!-- =========================
       CONTACT SECTION
  ========================== -->

  <section class="contact" id="contact">

    <div class="section-container">

      <h2>Contact</h2>

      <p>Email: officialshivamchoudhary2009@gmail.com</p>

      <button id="contactButton">
        Say Hello
      </button>

    </div>

  </section>



  <!-- =========================
       FOOTER
  ========================== -->

  <footer>
    <p>Built with HTML, CSS & JavaScript</p>
  </footer>



  <!-- JavaScript -->
  <script src="script.js"></script>

</body>
</html>
